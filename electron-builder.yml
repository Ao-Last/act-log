appId: com.actlog.app
productName: Act Log
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!docs/**'
asarUnpack:
  - resources/**

# macOS Configuration
mac:
  # Only build for arm64 (Apple Silicon)
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
  
  # Application icon (will use icon.icns from build folder)
  icon: build/icon.icns
  
  # macOS category
  category: public.app-category.productivity
  
  # Hardened Runtime (required for notarization)
  hardenedRuntime: true
  gatekeeperAssess: false
  
  # Entitlements for hardened runtime
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  
  # Notarization: requires env vars APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  notarize: true

# DMG Configuration
dmg:
  artifactName: ${name}-${version}-arm64.${ext}
  title: ${productName} ${version}
  icon: build/icon.icns
  background: null
  window:
    width: 540
    height: 380
  contents:
    - x: 144
      y: 180
    - x: 396
      y: 180
      type: link
      path: /Applications

npmRebuild: false

publish:
  provider: github
  owner: Ao-Last
  repo: act-log
